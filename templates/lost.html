{% extends "layout.html" %}
{% block content %}

<section class="form-section">
  <h2>Report a Lost Item</h2>
  
  <!-- AI Smart Report Section -->
  <div style="background: #f0f8ff; padding: 15px; border-radius: 8px; margin-bottom: 25px; border: 1px solid #cce5ff;">
    <h3 style="margin-top: 0; color: #004085; font-size: 1.1em;">✨ AI Smart Report</h3>
    <p style="font-size: 0.9em; color: #555; margin-bottom: 10px;">Too lazy to fill the form? Just describe what happened!</p>
    <textarea id="ai-text" placeholder="E.g., I lost my black Dell laptop in the library yesterday afternoon. It has a Batman sticker on it." style="width: 100%; height: 80px; padding: 10px; border-radius: 5px; border: 1px solid #ccc; margin-bottom: 10px;"></textarea>
    <button type="button" id="ai-submit-btn" style="background: #0056b3; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-size: 0.9em; width: 100%;">
      Autofill Form with AI
    </button>
  </div>

  <form action="/submit-lost" method="POST" enctype="multipart/form-data" class="styled-form">

    <label for="item-name">Item Name</label>
    <input type="text" id="item-name" name="item-name" required>

    <label for="item-description">Description</label>
    <textarea id="item-description" name="item-description" required></textarea>

    <label for="lost-date">Date of Loss</label>
    <input type="date" id="lost-date" name="lost-date" required>

    <label for="email">Your Email</label>
    <input type="email" id="email" name="email" value="{{ session['user_email'] if 'user_email' in session else '' }}" required>

    <label for="location">Location (Text Description)</label>
    <input type="text" id="location" name="location" placeholder="Enter area or place name" required>

    <!-- 🌍 Map -->
    <label>Select Exact Location on Map</label>
    <div id="map" style="height: 350px; border-radius: 10px; margin-bottom: 15px;"></div>

    <input type="hidden" name="latitude" id="latitude">
    <input type="hidden" name="longitude" id="longitude">

    <label for="image1">Upload Image 1</label>
    <input type="file" id="image1" name="image1" accept="image/*">

    <label for="image2">Upload Image 2</label>
    <input type="file" id="image2" name="image2" accept="image/*">

    <button type="submit" class="submit-button lost">Submit Lost Report</button>
  </form>
</section>

<!-- ✅ AI Smart Report Script -->
<script>
  document.getElementById('ai-submit-btn').addEventListener('click', async function() {
    const text = document.getElementById('ai-text').value;
    const btn = document.getElementById('ai-submit-btn');
    
    if (!text.trim()) {
      alert("Please enter a description first.");
      return;
    }
    
    btn.innerText = "⏳ AI is processing...";
    btn.disabled = true;

    try {
      const response = await fetch('/ai-parse-report', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: text })
      });
      
      const result = await response.json();
      if (result.success && result.data) {
        if(result.data.name) document.getElementById('item-name').value = result.data.name;
        if(result.data.description) document.getElementById('item-description').value = result.data.description;
        if(result.data.location) document.getElementById('location').value = result.data.location;
        if(result.data.date) document.getElementById('lost-date').value = result.data.date;
        
        // Update Map if coordinates exist
        if(result.data.latitude && result.data.longitude && typeof map !== 'undefined') {
            const lat = parseFloat(result.data.latitude);
            const lng = parseFloat(result.data.longitude);
            if (!isNaN(lat) && !isNaN(lng)) {
                if (window.marker) {
                    window.marker.setLatLng([lat, lng]);
                } else {
                    window.marker = L.marker([lat, lng]).addTo(map);
                }
                map.setView([lat, lng], 17);
                document.getElementById('latitude').value = lat;
                document.getElementById('longitude').value = lng;
            }
        }
        
        alert("✨ Form autofilled successfully! Please review the details before submitting.");
      } else {
        alert("Failed to parse report. " + (result.error || ""));
      }
    } catch (e) {
      alert("An error occurred: " + e.message);
    } finally {
      btn.innerText = "Autofill Form with AI";
      btn.disabled = false;
    }
  });
</script>

<!-- ✅ Leaflet & Geocoder Scripts -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

<script>
  // 🌐 Initialize map
  const map = L.map('map').setView([18.4578, 73.8509], 17); // Default to VIT Pune

  // Add tiles
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '🗺️ OpenStreetMap contributors',
    maxZoom: 19,
  }).addTo(map);

  // 📍 Marker logic
  window.marker = undefined;
  map.on('click', function(e) {
    const { lat, lng } = e.latlng;
    if (window.marker) {
      window.marker.setLatLng([lat, lng]);
    } else {
      window.marker = L.marker([lat, lng]).addTo(map);
    }
    document.getElementById('latitude').value = lat;
    document.getElementById('longitude').value = lng;
  });

  // 🔍 Search bar
  L.Control.geocoder({
    defaultMarkGeocode: false
  })
    .on('markgeocode', function(e) {
      const bbox = e.geocode.bbox;
      const center = e.geocode.center;
      map.fitBounds(bbox);
      if (window.marker) {
        window.marker.setLatLng(center);
      } else {
        window.marker = L.marker(center).addTo(map);
      }
      document.getElementById('latitude').value = center.lat;
      document.getElementById('longitude').value = center.lng;
    })
    .addTo(map);
</script>

<style>
  .custom-logo {
    background: rgb(42, 107, 247);
    padding: 5px 10px;
    border-radius: 6px;
    box-shadow: 0 0 5px rgba(0,0,0,0.3);
  }
</style>

{% endblock %}
